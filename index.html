<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon estándar para el navegador -->
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    
    <!-- Configuración Viewport optimizada para móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>Reto Verano</title>

    <!-- Configuración PWA (App Nativa iOS/Android) -->
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Reto Verano" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <!-- Contenedor principal donde React inyecta la aplicación -->
    <div id="root"></div>
    
    <!-- CORRECCIÓN VERCEL: Como tu main.jsx no está en una carpeta src, lo llamamos directamente -->
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
